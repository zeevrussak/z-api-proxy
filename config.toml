# Z-API Proxy Configuration
# Sensitive values (api_key, api_token, tunnel token) go in secrets.toml,
# not this file.

[server]
# Local listen address. Set this as the custom OpenAI base URL in Cursor.
listen = "127.0.0.1:8787"

[upstream]
# z.ai API base URL
base_url = "https://api.z.ai/api/coding/paas/v4"

# Cloudflare tunnel settings.
[tunnel]
mode = "quick"
hostname = ""

# Security: when true and api_key is set in secrets.toml, only matching keys
# are accepted. Others get 401.
[security]
verify_key = false

# Cloudflare Worker deployment settings.
[cloudflare]
account_id = ""
worker_name = "z-api-proxy"

# Model name mappings.
# "from" = model name as sent by Cursor
# "to"   = model name as expected by z.ai upstream

# GLM-5 family
[[models]]
from = "z.ai/glm-5.2"
to = "glm-5.2"

[[models]]
from = "z.ai/glm-5.1"
to = "glm-5.1"

[[models]]
from = "z.ai/glm-5"
to = "glm-5"

[[models]]
from = "z.ai/glm-5-turbo"
to = "glm-5-turbo"

[[models]]
from = "z.ai/glm-5v-turbo"
to = "glm-5v-turbo"

# GLM-4.7 family
[[models]]
from = "z.ai/glm-4.7"
to = "glm-4.7"

[[models]]
from = "z.ai/glm-4.7-flash"
to = "glm-4.7-flash"

[[models]]
from = "z.ai/glm-4.7-flashx"
to = "glm-4.7-flashx"

# GLM-4.6 family
[[models]]
from = "z.ai/glm-4.6"
to = "glm-4.6"

[[models]]
from = "z.ai/glm-4.6v"
to = "glm-4.6v"

# GLM-4.5 family
[[models]]
from = "z.ai/glm-4.5"
to = "glm-4.5"

[[models]]
from = "z.ai/glm-4.5-air"
to = "glm-4.5-air"

[[models]]
from = "z.ai/glm-4.5-flash"
to = "glm-4.5-flash"

[[models]]
from = "z.ai/glm-4.5v"
to = "glm-4.5v"
