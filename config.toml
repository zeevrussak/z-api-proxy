# Z-API Proxy Configuration
# This file is auto-created in %APPDATA%\Z-API-Proxy\config.toml on first run.
# Edit it via the tray menu → Configure...

[server]
# Local listen address. Set this as the custom OpenAI base URL in Cursor.
# In Cursor: Settings → Models → OpenAI API Base URL = http://127.0.0.1:8787/v1
listen = "127.0.0.1:8787"

[upstream]
# z.ai API base URL
base_url = "https://api.z.ai/api/paas/v4"

# API key for z.ai. Leave empty to pass through from Cursor.
api_key = ""

# Cloudflare tunnel settings.
# mode = "quick" (default): random ephemeral URL, no account needed.
# mode = "named":            stable URL, requires token from Cloudflare Zero Trust.
[tunnel]
mode = "quick"
token = ""
hostname = ""

# Model name mappings.
# "from" = model name as sent by Cursor
# "to"   = model name as expected by z.ai upstream

# GLM-5 family
[[models]]
from = "z.ai/glm-5.2"
to = "glm-5.2"

[[models]]
from = "z.ai/glm-5.1"
to = "glm-5.1"

[[models]]
from = "z.ai/glm-5"
to = "glm-5"

[[models]]
from = "z.ai/glm-5-turbo"
to = "glm-5-turbo"

[[models]]
from = "z.ai/glm-5v-turbo"
to = "glm-5v-turbo"

# GLM-4.7 family
[[models]]
from = "z.ai/glm-4.7"
to = "glm-4.7"

[[models]]
from = "z.ai/glm-4.7-flash"
to = "glm-4.7-flash"

[[models]]
from = "z.ai/glm-4.7-flashx"
to = "glm-4.7-flashx"

# GLM-4.6 family
[[models]]
from = "z.ai/glm-4.6"
to = "glm-4.6"

[[models]]
from = "z.ai/glm-4.6v"
to = "glm-4.6v"

# GLM-4.5 family
[[models]]
from = "z.ai/glm-4.5"
to = "glm-4.5"

[[models]]
from = "z.ai/glm-4.5-air"
to = "glm-4.5-air"

[[models]]
from = "z.ai/glm-4.5-flash"
to = "glm-4.5-flash"

[[models]]
from = "z.ai/glm-4.5v"
to = "glm-4.5v"
