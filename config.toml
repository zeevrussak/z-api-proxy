# Z-API Proxy Configuration
# Sensitive values (api_key, api_token, tunnel token) go in secrets.toml,
# not this file.

[server]
# Local listen address. Set this as the custom OpenAI base URL in Cursor.
listen = "127.0.0.1:8787"

[upstream]
# z.ai API base URL
base_url = "https://api.z.ai/api/coding/paas/v4"

# Cloudflare tunnel settings.
[tunnel]
mode = "quick"
hostname = ""

# Security: when true and api_key is set in secrets.toml, only matching keys
# are accepted. Others get 401.
[security]
verify_key = false

# Cloudflare Worker deployment settings.
[cloudflare]
account_id = ""
worker_name = "z-api-proxy"

# If your api_token (secrets.toml) has a Client IP Address Filtering
# restriction and your external IP changes periodically (e.g. dynamic
# residential IP), set this to true to have Z-API Proxy keep the
# token's allowed IP in sync automatically (polled every few minutes).
# Requires the token to already have "User API Tokens: Edit"
# permission on itself. NOTE: if the token's IP restriction has
# already drifted to exclude this machine's current IP before you
# enable this, the token is locked out of the API entirely (including
# the self-update call) — you must first fix the restriction manually
# in the Cloudflare dashboard to include the current IP, after which
# this feature keeps it in sync going forward.
auto_update_client_ip = false

# Model name mappings.
# "from" = model name as sent by Cursor
# "to"   = model name as expected by z.ai upstream

# IMPORTANT: Use obfuscated cursor-facing names (e.g. z.ai/gielem52/1M)
# instead of z.ai/glm-5.2. Cursor recognizes known model names and
# overrides the context window returned by /v1/models with its own values.
# Obfuscated names force Cursor to use our context_length.

# GLM-5 family with reasoning effort variants.
# /max = deep reasoning, /high = faster, /fast = no thinking.
# IMPORTANT: z.ai/gielem52 is obfuscated to bypass Cursor context override.

[[models]]
from = "z.ai/gielem52/1M/max"
to = "glm-5.2|max"

[[models]]
from = "z.ai/gielem52/1M/high"
to = "glm-5.2|high"

[[models]]
from = "z.ai/gielem52/1M/fast"
to = "glm-5.2|none"

[[models]]
from = "z.ai/glm-5.2/200k/max"
to = "glm-5.2|max"

[[models]]
from = "z.ai/glm-5.2/200k/fast"
to = "glm-5.2|none"

[[models]]
from = "z.ai/glm-5.1/max"
to = "glm-5.1|max"

[[models]]
from = "z.ai/glm-5.1/fast"
to = "glm-5.1|none"

[[models]]
from = "z.ai/glm-5"
to = "glm-5"

[[models]]
from = "z.ai/glm-5-turbo"
to = "glm-5-turbo"

[[models]]
from = "z.ai/glm-5v-turbo"
to = "glm-5v-turbo"

# GLM-4.7 family
[[models]]
from = "z.ai/glm-4.7"
to = "glm-4.7"

[[models]]
from = "z.ai/glm-4.7-flash"
to = "glm-4.7-flash"

[[models]]
from = "z.ai/glm-4.7-flashx"
to = "glm-4.7-flashx"

# GLM-4.6 family
[[models]]
from = "z.ai/glm-4.6"
to = "glm-4.6"

[[models]]
from = "z.ai/glm-4.6v"
to = "glm-4.6v"

# GLM-4.5 family
[[models]]
from = "z.ai/glm-4.5"
to = "glm-4.5"

[[models]]
from = "z.ai/glm-4.5-air"
to = "glm-4.5-air"

[[models]]
from = "z.ai/glm-4.5-flash"
to = "glm-4.5-flash"

[[models]]
from = "z.ai/glm-4.5v"
to = "glm-4.5v"
